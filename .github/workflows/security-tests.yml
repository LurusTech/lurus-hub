name: Security Tests

on:
  push:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false

jobs:
  security-tests:
    name: Security Regression Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run Security Tests
        run: |
          echo "=== Running Security Test Suite ==="
          go test -v ./internal/adapter/... -run Security -count=1 -timeout=5m
          go test -v ./internal/adapter/repo/... -run Tenant -count=1 -timeout=5m
          go test -v ./internal/adapter/handler/... -run Security -count=1 -timeout=5m
          go test -v ./internal/adapter/middleware/... -run "JWKS|Zitadel" -count=1 -timeout=5m

      - name: Run OAuth Security Tests
        run: |
          echo "=== Running OAuth Security Tests ==="
          go test -v ./internal/adapter/handler/... -run "PKCE|IDToken|TenantSlug|RedirectURL|OAuthState" -count=1

      - name: Summary
        if: always()
        run: |
          echo "## Security Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Security regression tests completed." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Categories" >> $GITHUB_STEP_SUMMARY
          echo "- Tenant Isolation Tests" >> $GITHUB_STEP_SUMMARY
          echo "- JWKS Key Rotation Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Rate Limiting Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Input Sanitization Tests (SQL Injection, XSS)" >> $GITHUB_STEP_SUMMARY
          echo "- Auth Bypass Tests (JWT validation)" >> $GITHUB_STEP_SUMMARY
          echo "- OAuth/PKCE Security Tests" >> $GITHUB_STEP_SUMMARY
