apiVersion: apps/v1
kind: Deployment
metadata:
  name: lurus-api
  namespace: lurus-system
  labels:
    app: lurus-api
    app.kubernetes.io/name: lurus-api
    app.kubernetes.io/part-of: lurus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lurus-api
  template:
    metadata:
      labels:
        app: lurus-api
        app.kubernetes.io/managed-by: argocd
    spec:
      nodeSelector:
        lurus.cn/vpn: "true"
      containers:
        - name: lurus-api
          image: ghcr.io/hanmahong5-arch/lurus-api:main
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: TZ
              value: "Asia/Shanghai"
            # Session secret for persistent login
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: lurus-api-secrets
                  key: SESSION_SECRET
            - name: SQL_DSN
              valueFrom:
                secretKeyRef:
                  name: lurus-api-secrets
                  key: SQL_DSN
            # MeiliSearch Configuration
            - name: MEILISEARCH_ENABLED
              value: "true"
            - name: MEILISEARCH_HOST
              value: "http://meilisearch:7700"
            - name: MEILISEARCH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: meilisearch-secrets
                  key: MEILI_MASTER_KEY
            - name: MEILISEARCH_SYNC_ENABLED
              value: "true"
            - name: MEILISEARCH_SYNC_BATCH_SIZE
              value: "1000"
            - name: MEILISEARCH_WORKER_COUNT
              value: "2"
            # Zitadel OIDC Configuration
            - name: ZITADEL_ENABLED
              value: "true"
            - name: ZITADEL_ISSUER
              value: "https://auth.lurus.cn"
            - name: ZITADEL_JWKS_URI
              value: "https://auth.lurus.cn/oauth/v2/keys"
            - name: ZITADEL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: lurus-api-secrets
                  key: ZITADEL_CLIENT_ID
            - name: ZITADEL_REDIRECT_URI
              value: "https://api.lurus.cn/api/v2/oauth/callback"
            - name: ZITADEL_POST_LOGOUT_REDIRECT_URI
              value: "https://api.lurus.cn"
            - name: ZITADEL_ENABLE_PKCE
              value: "true"
            - name: ZITADEL_AUTO_CREATE_TENANT
              value: "true"
            - name: ZITADEL_AUTO_CREATE_USER
              value: "true"
            - name: ZITADEL_ALLOWED_REDIRECT_DOMAINS
              value: "lurus.cn,api.lurus.cn"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/status
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/status
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
