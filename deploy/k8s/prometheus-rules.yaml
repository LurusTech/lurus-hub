# PrometheusRule for Lurus API Alerting
# Requires: Prometheus Operator (kube-prometheus-stack)
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: lurus-api-alerts
  namespace: lurus-system
  labels:
    app: lurus-api
    release: prometheus  # Match your Prometheus Operator release label
spec:
  groups:
    - name: lurus-api.rules
      interval: 30s
      rules:
        # --- Availability Alerts ---

        # Alert: High Error Rate (> 5% for 5 minutes)
        - alert: LurusApiHighErrorRate
          expr: |
            sum(rate(lurus_gateway_requests_total{status=~"5.."}[5m]))
            /
            sum(rate(lurus_gateway_requests_total[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Lurus API high error rate"
            description: "Error rate is {{ printf \"%.2f\" $value | float64Mul 100 }}% (threshold: 5%)"
            runbook_url: "https://docs.lurus.cn/runbook/incident-response"

        # Alert: Relay Provider Error Rate (> 10% for 5 minutes)
        - alert: LurusRelayProviderErrors
          expr: |
            sum by (provider) (rate(lurus_gateway_relay_requests_total{status=~"error|5.."}[5m]))
            /
            sum by (provider) (rate(lurus_gateway_relay_requests_total[5m])) > 0.10
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Relay provider {{ $labels.provider }} high error rate"
            description: "Provider {{ $labels.provider }} error rate is {{ printf \"%.2f\" $value | float64Mul 100 }}%"

        # --- Latency Alerts ---

        # Alert: P95 Latency > 200ms for 10 minutes
        - alert: LurusApiHighLatency
          expr: |
            histogram_quantile(0.95, sum(rate(lurus_gateway_request_duration_seconds_bucket[5m])) by (le)) > 0.2
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Lurus API P95 latency high"
            description: "P95 latency is {{ printf \"%.3f\" $value }}s (threshold: 200ms)"
            runbook_url: "https://docs.lurus.cn/runbook/incident-response"

        # Alert: Upstream Relay Latency > 30s
        - alert: LurusRelaySlowResponse
          expr: |
            histogram_quantile(0.95, sum by (provider) (rate(lurus_gateway_relay_duration_seconds_bucket[5m])) by (le, provider)) > 30
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Relay provider {{ $labels.provider }} slow response"
            description: "Provider {{ $labels.provider }} P95 latency is {{ printf \"%.1f\" $value }}s"

        # --- Channel Health Alerts ---

        # Alert: Channel Unhealthy
        - alert: LurusChannelUnhealthy
          expr: |
            lurus_gateway_channel_health == 0
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Channel {{ $labels.channel_name }} is unhealthy"
            description: "Channel {{ $labels.channel_id }} ({{ $labels.provider }}) has been unhealthy for 5 minutes"

        # Alert: Channel Consecutive Errors > 10
        - alert: LurusChannelConsecutiveErrors
          expr: |
            lurus_gateway_channel_consecutive_errors > 10
          for: 0m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Channel {{ $labels.channel_name }} has {{ printf \"%.0f\" $value }} consecutive errors"
            description: "Channel {{ $labels.channel_id }} ({{ $labels.provider }}) has exceeded 10 consecutive errors"

        # Alert: High Retry Rate (> 20% indicates channel instability)
        - alert: LurusHighRetryRate
          expr: |
            sum(rate(lurus_gateway_retry_attempts_total[5m]))
            /
            sum(rate(lurus_gateway_relay_requests_total[5m])) > 0.20
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Lurus API high retry rate"
            description: "Retry rate is {{ printf \"%.2f\" $value | float64Mul 100 }}%, indicating channel instability"

        # --- Resource Alerts ---

        # Alert: Pod Restart > 3 times in 1 hour
        - alert: LurusApiPodRestarts
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="lurus-system", container="lurus-api"}[1h]) > 3
          for: 0m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Lurus API pod {{ $labels.pod }} restarting frequently"
            description: "Pod {{ $labels.pod }} has restarted {{ printf \"%.0f\" $value }} times in the last hour"
            runbook_url: "https://docs.lurus.cn/runbook/incident-response"

        # Alert: High Active Connections
        - alert: LurusApiHighConnections
          expr: |
            lurus_gateway_active_connections > 1000
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Lurus API high active connections"
            description: "Active connections: {{ $value }} (threshold: 1000)"

        # Alert: Pod Not Ready
        - alert: LurusApiPodNotReady
          expr: |
            kube_pod_status_ready{namespace="lurus-system", condition="true"} == 0
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Lurus API pod {{ $labels.pod }} not ready"
            description: "Pod {{ $labels.pod }} has been not ready for 5 minutes"

        # --- Cache Alerts ---

        # Alert: Cache Miss Rate > 50%
        - alert: LurusCacheMissRateHigh
          expr: |
            sum(rate(lurus_gateway_cache_hits_total{result="miss"}[5m]))
            /
            sum(rate(lurus_gateway_cache_hits_total[5m])) > 0.50
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Lurus cache miss rate high"
            description: "Cache miss rate is {{ printf \"%.2f\" $value | float64Mul 100 }}%"
