# Lurus-API Secrets Template
# WARNING: This file contains PLACEHOLDER values only
# NEVER commit real secrets to Git
#
# Real credentials: See ../../../重要信息.md (DO NOT COMMIT)
#
# Deployment Steps:
# 1. Copy template: cp secrets.yaml secrets.prod.yaml
# 2. Edit secrets.prod.yaml with REAL values from 重要信息.md
# 3. Deploy: kubectl apply -f secrets.prod.yaml
# 4. Verify secrets.prod.yaml is in .gitignore
#
# For CI/CD: Use Sealed Secrets or External Secrets Operator
apiVersion: v1
kind: Secret
metadata:
  name: lurus-api-secrets
  namespace: lurus-system
type: Opaque
stringData:
  # ============================================
  # Database Connection
  # ============================================
  # Format: postgres://USER:PASSWORD@HOST:PORT/DATABASE?sslmode=disable
  #
  # Reference: 重要信息.md -> "数据库 PostgreSQL" section
  # User: lurus
  # Password: (see 重要信息.md)
  # Host: 100.94.177.10 (or 100.98.57.55 via Tailscale)
  # Port: 30543 (NodePort) or 5432 (ClusterIP: lurus-pg-rw.database.svc)
  # Database: lurusapi
  #
  # Example (REPLACE WITH REAL VALUES):
  SQL_DSN: "postgres://lurus:PLACEHOLDER_PASSWORD@100.94.177.10:30543/lurusapi?sslmode=disable"

  # ============================================
  # Session Secret
  # ============================================
  # Generate with: openssl rand -base64 32
  # MUST be at least 32 characters for security
  #
  # Generate a NEW secret (do NOT reuse from leaked version)
  SESSION_SECRET: "PLACEHOLDER-GENERATE-NEW-WITH-OPENSSL-RAND"

  # ============================================
  # Alipay OAuth
  # ============================================
  # Get RSA2 keys from: https://open.alipay.com/develop/manage
  #
  # Reference: Contact payment team for Alipay credentials
  ALIPAY_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    PLACEHOLDER-REPLACE-WITH-REAL-ALIPAY-PRIVATE-KEY
    -----END RSA PRIVATE KEY-----
  ALIPAY_PUBLIC_KEY: |
    -----BEGIN PUBLIC KEY-----
    PLACEHOLDER-REPLACE-WITH-REAL-ALIPAY-PUBLIC-KEY
    -----END PUBLIC KEY-----

  # ============================================
  # Zitadel OIDC
  # ============================================
  # Get from Zitadel Console: https://auth.lurus.cn
  #
  # Reference: 重要信息.md -> "Zitadel 身份认证" section
  # Format: {project_id}@{project_name}
  #
  # Current Client ID (from existing deployment):
  ZITADEL_CLIENT_ID: "358371335178617311@lurus-api"
