# ServiceMonitor for Prometheus to scrape Lurus API metrics
# Requires: Prometheus Operator (kube-prometheus-stack)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lurus-api
  namespace: lurus-system
  labels:
    app: lurus-api
    release: prometheus  # Match your Prometheus Operator release label
spec:
  selector:
    matchLabels:
      app: lurus-api
  namespaceSelector:
    matchNames:
      - lurus-system
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      # Honor labels from the target to avoid overwriting
      honorLabels: true
      # Relabeling to add instance identification
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
      # Metric relabeling for cardinality control (optional)
      # Uncomment to limit high-cardinality labels if needed
      # metricRelabelings:
      #   - sourceLabels: [path]
      #     regex: "/api/v[12]/.*"
      #     action: keep
