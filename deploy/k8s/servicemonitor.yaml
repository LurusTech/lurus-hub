apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lurus-api
  namespace: lurus-system
  labels:
    app: lurus-api
    app.kubernetes.io/part-of: lurus
    release: prometheus
spec:
  selector:
    matchLabels:
      app: lurus-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
