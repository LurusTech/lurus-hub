# Staging IngressRoute for Traefik
# Accessible at staging-api.lurus.cn
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lurus-api-staging
  namespace: lurus-staging
  labels:
    app: lurus-api
    environment: staging
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`staging-api.lurus.cn`)
      kind: Rule
      services:
        - name: lurus-api
          port: 8850
  tls:
    secretName: lurus-cn-wildcard-tls
---
# TLS Certificate via cert-manager
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: staging-api-lurus-cn-tls
  namespace: lurus-staging
spec:
  secretName: staging-api-lurus-cn-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - staging-api.lurus.cn
---
# HTTP to HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: lurus-api-staging-http
  namespace: lurus-staging
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`staging-api.lurus.cn`)
      kind: Rule
      middlewares:
        - name: redirect-https
          namespace: traefik
      services:
        - name: lurus-api
          port: 8850
