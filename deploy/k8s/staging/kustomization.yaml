apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lurus-staging

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  # Uncomment to include secrets (or create manually)
  # - secrets.yaml

labels:
  - pairs:
      environment: staging
      app.kubernetes.io/managed-by: argocd

images:
  - name: ghcr.io/lurustech/lurus-api
    newTag: staging
