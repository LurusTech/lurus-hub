# Staging secrets template
# Values should be base64 encoded
# Create actual secrets:
#   kubectl -n lurus-staging create secret generic lurus-api-staging-secrets \
#     --from-literal=SESSION_SECRET='your-staging-session-secret' \
#     --from-literal=SQL_DSN='postgres://lurus:password@postgres:5432/lurusapi_staging' \
#     --from-literal=ZITADEL_CLIENT_ID='staging-client-id'
#
# Or apply this template with actual values:
apiVersion: v1
kind: Secret
metadata:
  name: lurus-api-staging-secrets
  namespace: lurus-staging
  labels:
    app: lurus-api
    environment: staging
type: Opaque
stringData:
  # Session secret (generate: openssl rand -hex 32)
  SESSION_SECRET: "REPLACE_WITH_STAGING_SESSION_SECRET"
  # Staging database DSN (separate database/schema)
  SQL_DSN: "postgres://lurus:REPLACE_PASSWORD@100.94.177.10:30543/lurusapi_staging"
  # Zitadel client ID for staging
  ZITADEL_CLIENT_ID: "REPLACE_WITH_STAGING_CLIENT_ID"
