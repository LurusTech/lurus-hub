openapi: 3.0.3
info:
  title: Lurus API V2 - Multi-Tenant Gateway
  description: |
    Lurus API V2 provides multi-tenant access to LLM API gateway services.

    ## Authentication

    V2 API uses **Zitadel OAuth 2.0** for authentication:

    1. Redirect user to `GET /api/v2/{tenant_slug}/auth/login`
    2. User authenticates with Zitadel
    3. Callback redirects to `GET /api/v2/oauth/callback`
    4. Use session cookie or JWT for subsequent requests

    ## Tenant Isolation

    All tenant-specific endpoints are scoped by `{tenant_slug}` in the URL path.
    Users can only access data within their assigned tenant.

    ## Rate Limiting

    - Standard endpoints: 100 requests/minute per user
    - Relay endpoints: Based on quota allocation

  version: 2.0.0
  contact:
    name: Lurus Support
    email: support@lurus.cn
  license:
    name: Proprietary
    url: https://lurus.cn/terms

servers:
  - url: https://api.lurus.cn
    description: Production
  - url: http://localhost:3000
    description: Local Development

tags:
  - name: OAuth
    description: OAuth 2.0 authentication flows
  - name: User
    description: User profile management
  - name: Channels
    description: LLM provider channel management
  - name: Tokens
    description: API token management
  - name: Billing
    description: Billing and subscriptions
  - name: Logs
    description: Usage logs
  - name: Redemptions
    description: Redemption codes
  - name: Tenant Config
    description: Tenant configuration (Admin)
  - name: Platform Admin
    description: Platform-level administration

paths:
  # ============================================================
  # OAuth Authentication Routes
  # ============================================================

  /api/v2/{tenant_slug}/auth/login:
    get:
      tags: [OAuth]
      summary: Initiate OAuth Login
      description: |
        Redirects to Zitadel login page with PKCE challenge.
        After successful authentication, user is redirected to callback URL.
      operationId: zitadelLoginRedirect
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - name: redirect_url
          in: query
          description: URL to redirect after successful login
          schema:
            type: string
            example: /console
      responses:
        '302':
          description: Redirect to Zitadel login
          headers:
            Location:
              description: Zitadel authorization URL
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Tenant not found

  /api/v2/oauth/callback:
    get:
      tags: [OAuth]
      summary: OAuth Callback
      description: |
        Handles OAuth callback from Zitadel.
        Exchanges authorization code for tokens and creates session.
      operationId: zitadelCallback
      parameters:
        - name: code
          in: query
          required: true
          description: Authorization code from Zitadel
          schema:
            type: string
        - name: state
          in: query
          required: true
          description: State parameter for CSRF protection
          schema:
            type: string
      responses:
        '302':
          description: Redirect to original URL with session established
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/auth/session-info:
    get:
      tags: [OAuth]
      summary: Get Session Info
      description: Returns current user session data for frontend
      operationId: getSessionInfo
      responses:
        '200':
          description: Session information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/oauth/logout:
    post:
      tags: [OAuth]
      summary: Logout
      description: Logs out from Zitadel and clears session
      operationId: zitadelLogout
      responses:
        '200':
          description: Successfully logged out
        '302':
          description: Redirect to Zitadel logout URL

  /api/v2/oauth/refresh:
    post:
      tags: [OAuth]
      summary: Refresh Access Token
      description: Refreshes the OAuth access token using refresh token
      operationId: refreshAccessToken
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================
  # User Routes
  # ============================================================

  /api/v2/{tenant_slug}/user/me:
    get:
      tags: [User]
      summary: Get Current User
      description: Returns the current authenticated user's profile
      operationId: getSelfV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [User]
      summary: Update Current User
      description: Updates the current user's profile
      operationId: updateSelfV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ============================================================
  # Channel Routes
  # ============================================================

  /api/v2/{tenant_slug}/channels:
    get:
      tags: [Channels]
      summary: List Channels
      description: Lists all available LLM provider channels
      operationId: listChannelsV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: keyword
          in: query
          description: Search keyword
          schema:
            type: string
      responses:
        '200':
          description: List of channels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Channels]
      summary: Create Channel
      description: Creates a new LLM provider channel (Admin only)
      operationId: createChannelV2
      security:
        - ZitadelJWT: [admin]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelCreate'
      responses:
        '201':
          description: Channel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v2/{tenant_slug}/channels/{id}:
    get:
      tags: [Channels]
      summary: Get Channel
      description: Gets a specific channel by ID
      operationId: getChannelV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '200':
          description: Channel details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Channels]
      summary: Update Channel
      description: Updates a channel (Admin only)
      operationId: updateChannelV2
      security:
        - ZitadelJWT: [admin]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelUpdate'
      responses:
        '200':
          description: Channel updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Channels]
      summary: Delete Channel
      description: Deletes a channel (Admin only)
      operationId: deleteChannelV2
      security:
        - ZitadelJWT: [admin]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/ChannelId'
      responses:
        '204':
          description: Channel deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Token Routes
  # ============================================================

  /api/v2/{tenant_slug}/tokens:
    get:
      tags: [Tokens]
      summary: List Tokens
      description: Lists all API tokens for the current user
      operationId: listTokensV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: List of tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Tokens]
      summary: Create Token
      description: Creates a new API token
      operationId: createTokenV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenCreate'
      responses:
        '201':
          description: Token created (includes full key, only shown once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenWithKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/{tenant_slug}/tokens/{id}:
    put:
      tags: [Tokens]
      summary: Update Token
      description: Updates an API token
      operationId: updateTokenV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/TokenId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenUpdate'
      responses:
        '200':
          description: Token updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Tokens]
      summary: Delete Token
      description: Deletes an API token
      operationId: deleteTokenV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/TokenId'
      responses:
        '204':
          description: Token deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Billing Routes
  # ============================================================

  /api/v2/{tenant_slug}/billing/topups:
    get:
      tags: [Billing]
      summary: List Top-ups
      description: Lists user's top-up history
      operationId: getTopUpsV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Top-up history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopUpList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/{tenant_slug}/billing/topup:
    post:
      tags: [Billing]
      summary: Create Top-up
      description: Initiates a new top-up payment
      operationId: topUpV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopUpRequest'
      responses:
        '200':
          description: Payment URL returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopUpResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/{tenant_slug}/billing/subscriptions:
    get:
      tags: [Billing]
      summary: List Subscriptions
      description: Lists user's active subscriptions
      operationId: getSubscriptionsV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
      responses:
        '200':
          description: Subscription list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/{tenant_slug}/billing/subscribe:
    post:
      tags: [Billing]
      summary: Create Subscription
      description: Subscribes to a plan
      operationId: subscribeV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '200':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/{tenant_slug}/billing/subscriptions/{id}:
    delete:
      tags: [Billing]
      summary: Cancel Subscription
      description: Cancels a subscription
      operationId: cancelSubscriptionV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Subscription cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Log Routes
  # ============================================================

  /api/v2/{tenant_slug}/logs:
    get:
      tags: [Logs]
      summary: Get User Logs
      description: Gets usage logs for the current user
      operationId: getLogsV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: model
          in: query
          description: Filter by model name
          schema:
            type: string
        - name: start_time
          in: query
          description: Start time (Unix timestamp)
          schema:
            type: integer
        - name: end_time
          in: query
          description: End time (Unix timestamp)
          schema:
            type: integer
      responses:
        '200':
          description: Usage logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v2/{tenant_slug}/logs/all:
    get:
      tags: [Logs]
      summary: Get All Logs
      description: Gets all users' logs (Admin only)
      operationId: getAllLogsV2
      security:
        - ZitadelJWT: [admin]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: user_id
          in: query
          description: Filter by user ID
          schema:
            type: integer
      responses:
        '200':
          description: All logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ============================================================
  # Redemption Routes
  # ============================================================

  /api/v2/{tenant_slug}/redemptions/redeem:
    post:
      tags: [Redemptions]
      summary: Redeem Code
      description: Redeems a redemption code for quota
      operationId: redeemCodeV2
      security:
        - ZitadelJWT: []
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: Redemption code
      responses:
        '200':
          description: Code redeemed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  quota: { type: integer, description: Quota added }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Code not found or already used

  /api/v2/{tenant_slug}/redemptions:
    get:
      tags: [Redemptions]
      summary: List Redemption Codes
      description: Lists all redemption codes (Admin only)
      operationId: listRedemptionsV2
      security:
        - ZitadelJWT: [admin]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Redemption code list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedemptionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Redemptions]
      summary: Create Redemption Code
      description: Creates a new redemption code (Admin only)
      operationId: createRedemptionV2
      security:
        - ZitadelJWT: [admin]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedemptionCreate'
      responses:
        '201':
          description: Redemption code created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Redemption'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v2/{tenant_slug}/redemptions/{id}:
    delete:
      tags: [Redemptions]
      summary: Delete Redemption Code
      description: Deletes a redemption code (Admin only)
      operationId: deleteRedemptionV2
      security:
        - ZitadelJWT: [admin]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Redemption deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Tenant Config Routes (Admin)
  # ============================================================

  /api/v2/{tenant_slug}/config:
    get:
      tags: [Tenant Config]
      summary: Get Tenant Configs
      description: Gets all tenant configuration (Admin only)
      operationId: getTenantConfigs
      security:
        - ZitadelJWT: [admin]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
      responses:
        '200':
          description: Tenant configurations
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v2/{tenant_slug}/config/{key}:
    put:
      tags: [Tenant Config]
      summary: Update Tenant Config
      description: Updates a tenant configuration value (Admin only)
      operationId: updateTenantConfig
      security:
        - ZitadelJWT: [admin]
      parameters:
        - $ref: '#/components/parameters/TenantSlug'
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
      responses:
        '200':
          description: Config updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ============================================================
  # Platform Admin Routes
  # ============================================================

  /api/v2/admin/tenants:
    get:
      tags: [Platform Admin]
      summary: List Tenants
      description: Lists all tenants (Platform Admin only)
      operationId: listTenants
      security:
        - SessionAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Tenant list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Platform Admin]
      summary: Create Tenant
      description: Creates a new tenant (Platform Admin only)
      operationId: createTenant
      security:
        - SessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreate'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v2/admin/tenants/{id}:
    get:
      tags: [Platform Admin]
      summary: Get Tenant
      description: Gets a tenant by ID (Platform Admin only)
      operationId: getTenant
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Platform Admin]
      summary: Update Tenant
      description: Updates a tenant (Platform Admin only)
      operationId: updateTenant
      security:
        - SessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUpdate'
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Platform Admin]
      summary: Delete Tenant
      description: Deletes a tenant (Platform Admin only)
      operationId: deleteTenant
      security:
        - SessionAuth: []
      parameters:
