# ============================================================
# Components
# ============================================================

components:
  securitySchemes:
    ZitadelJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Zitadel OAuth 2.0 JWT token
    SessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie for platform admin

  parameters:
    TenantSlug:
      name: tenant_slug
      in: path
      required: true
      description: Tenant identifier (slug)
      schema:
        type: string
        pattern: '^[a-z0-9-]+$'
        example: lurus
    Page:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ChannelId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    TokenId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Invalid request"

    SessionInfo:
      type: object
      properties:
        user_id:
          type: integer
        username:
          type: string
        email:
          type: string
        display_name:
          type: string
        role:
          type: integer
        tenant_id:
          type: string
        tenant_slug:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Seconds until expiration

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        display_name:
          type: string
        role:
          type: integer
        status:
          type: integer
        quota:
          type: integer
        used_quota:
          type: integer
        created_at:
          type: integer
          description: Unix timestamp

    UserUpdate:
      type: object
      properties:
        display_name:
          type: string
          maxLength: 50

    Channel:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: integer
        base_url:
          type: string
        models:
          type: string
        status:
          type: integer
        priority:
          type: integer
        weight:
          type: integer

    ChannelCreate:
      type: object
      required: [name, type, key]
      properties:
        name:
          type: string
        type:
          type: integer
        key:
          type: string
        base_url:
          type: string
        models:
          type: string
        group:
          type: string
        priority:
          type: integer
          default: 0
        weight:
          type: integer
          default: 1

    ChannelUpdate:
      type: object
      properties:
        name:
          type: string
        key:
          type: string
        base_url:
          type: string
        models:
          type: string
        status:
          type: integer
        priority:
          type: integer
        weight:
          type: integer

    ChannelList:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Channel'
        total:
          type: integer

    Token:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        key:
          type: string
          description: Masked key (sk-xxx...xxx)
        status:
          type: integer
        quota:
          type: integer
        used_quota:
          type: integer
        expired_time:
          type: integer
        created_at:
          type: integer

    TokenWithKey:
      allOf:
        - $ref: '#/components/schemas/Token'
        - type: object
          properties:
            full_key:
              type: string
              description: Full API key (only shown once)

    TokenCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 50
        quota:
          type: integer
          minimum: 0
        expired_time:
          type: integer
          description: Unix timestamp, -1 for never

    TokenUpdate:
      type: object
      properties:
        name:
          type: string
        status:
          type: integer
        quota:
          type: integer
        expired_time:
          type: integer

    TokenList:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Token'
        total:
          type: integer

    TopUpRequest:
      type: object
      required: [amount, payment_method]
      properties:
        amount:
          type: number
          minimum: 1
        payment_method:
          type: string
          enum: [stripe, epay, creem]

    TopUpResponse:
      type: object
      properties:
        success:
          type: boolean
        payment_url:
          type: string
        order_id:
          type: string

    TopUpList:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              amount:
                type: number
              quota:
                type: integer
              status:
                type: string
              created_at:
                type: integer
        total:
          type: integer

    Subscription:
      type: object
      properties:
        id:
          type: integer
        plan_id:
          type: integer
        plan_name:
          type: string
        status:
          type: string
        started_at:
          type: integer
        expires_at:
          type: integer

    SubscribeRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id:
          type: integer
        payment_method:
          type: string

    SubscriptionList:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'

    LogList:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              user_id:
                type: integer
              model:
                type: string
              prompt_tokens:
                type: integer
              completion_tokens:
                type: integer
              quota:
                type: integer
              created_at:
                type: integer
        total:
          type: integer

    Redemption:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        quota:
          type: integer
        count:
          type: integer
        used_count:
          type: integer
        status:
          type: integer
        created_at:
          type: integer

    RedemptionCreate:
      type: object
      required: [quota, count]
      properties:
        quota:
          type: integer
          minimum: 1
        count:
          type: integer
          minimum: 1
          maximum: 100

    RedemptionList:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Redemption'
        total:
          type: integer

    Tenant:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        name:
          type: string
        zitadel_org_id:
          type: string
        status:
          type: string
          enum: [active, disabled, suspended]
        created_at:
          type: integer

    TenantCreate:
      type: object
      required: [slug, name, zitadel_org_id]
      properties:
        slug:
          type: string
          pattern: '^[a-z0-9-]+$'
        name:
          type: string
        zitadel_org_id:
          type: string

    TenantUpdate:
      type: object
      properties:
        name:
          type: string
        status:
          type: string

    TenantList:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
        total:
          type: integer

    TenantStats:
      type: object
      properties:
        user_count:
          type: integer
        token_count:
          type: integer
        channel_count:
          type: integer
        total_quota:
          type: integer
        used_quota:
          type: integer

    UserMapping:
      type: object
      properties:
        id:
          type: integer
        zitadel_user_id:
          type: string
        lurus_user_id:
          type: integer
        tenant_id:
          type: string
        created_at:
          type: integer

    UserMappingList:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserMapping'
        total:
          type: integer

    SystemStats:
      type: object
      properties:
        tenant_count:
          type: integer
        total_users:
          type: integer
        total_requests:
          type: integer
        total_tokens:
          type: integer
